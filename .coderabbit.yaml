language: en-US
tone_instructions: "Be concise and focus on concrete regressions, compatibility risks, security issues, and missing tests."

reviews:
    profile: assertive
    high_level_summary: true
    auto_review:
        enabled: true
        drafts: false
    path_instructions:
        - path: "mjr_am_backend/**"
          instructions: "Focus on route security, filesystem path guards, database lifecycle safety, async blocking risks, and Result-style error handling."
        - path: "js/**"
          instructions: "Focus on ComfyUI frontend API compatibility, Vue lifecycle cleanup, Pinia state consistency, keyboard/mouse regressions, and generated bundle drift."
        - path: "js_dist/**"
          instructions: "Treat these files as generated build artifacts. Only flag missing or inconsistent bundle updates, not minified style or generated code structure."
        - path: "tests/**"
          instructions: "Focus on meaningful assertions, regression coverage, fixture isolation, and avoiding sleeps or order-dependent tests."
        - path: "docs/**"
          instructions: "Review for factual drift against the implementation and broken internal links. Avoid style-only comments."
    tools:
        ruff:
            enabled: true
        markdownlint:
            enabled: false
        github-checks:
            enabled: true
