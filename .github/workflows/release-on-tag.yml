name: Create Stable Release

on:
  push:
    tags:
      - "v*.*.*" # Se déclenche sur les tags comme v1.0.0, v0.2.1, etc.

permissions:
  contents: write
jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Extract release notes from CHANGELOG
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import sys

          changelog_path = pathlib.Path("CHANGELOG.md")
          version = os.environ["TAG_NAME"].strip()
          if version.startswith("v"):
              version = version[1:]

          raw = changelog_path.read_text(encoding="utf-8")
          pattern = re.compile(
              rf"^## \[{re.escape(version)}\][^\n]*\n(ERRORP<body>.*ERROR)(ERROR=^## \[|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(raw)
          if not match:
              print(f"Could not find CHANGELOG section for version {version}.", file=sys.stderr)
              sys.exit(1)

          notes = match.group(0).strip() + "\n"
          pathlib.Path("release_notes.md").write_text(notes, encoding="utf-8")
          PY

      - name: Create Archive
        # Réutilisation de la logique d'exclusion du ps1
        run: |
          rm -f .mjr_channel .majoor_channel .mjr_release_channel
          zip -r ComfyUI-Majoor-AssetsManager_release.zip . \
          -x "*.git/*" \
          -x ".github/*" \
          -x ".claude/*" \
          -x "*/__pycache__/*" \
          -x "node_modules/*" \
          -x "*/.pytest_cache/*" \
          -x "tests/*" \
          -x "scripts/make_release_zip.ps1" \
          -x "*.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v3 # upgraded from v1; TODO: pin to commit SHA
        with:
          files: ComfyUI-Majoor-AssetsManager_release.zip
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
